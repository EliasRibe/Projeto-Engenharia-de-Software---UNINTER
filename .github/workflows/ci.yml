name: SGHSS QA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  newman:
    # roda só se houver ao menos 1 coleção Postman
    if: ${{ hashFiles('test_functional/postman/**/*.postman_collection.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm i -g newman
      - name: Run Postman collections (Newman)
        shell: bash
        run: |
          shopt -s nullglob
          for c in test_functional/postman/*.postman_collection.json; do
            env_file="${c%.postman_collection.json}.env.json"
            if [[ -f "$env_file" ]]; then
              newman run "$c" -e "$env_file" --reporters cli,junit --reporter-junit-export newman.xml
            else
              newman run "$c" --reporters cli,junit --reporter-junit-export newman.xml
            fi
          done
      - name: Upload Newman report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman.xml
          if-no-files-found: ignore

  cypress:
    # roda se existir qualquer spec em UI ou A11y
    if: ${{ hashFiles('test_functional/cypress/**/*.cy.js') != '' || hashFiles('test_accessibility/cypress-axe/**/*.cy.js') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps (with fallback)
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            npm ci || npm i
          else
            npm init -y
            npm i -D cypress cypress-axe
          fi
      - name: Run Cypress (UI + A11y)
        run: |
          npx cypress run --spec "test_functional/cypress/**/*.cy.js,test_accessibility/cypress-axe/**/*.cy.js" || true
      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  zap_baseline:
    # só roda se você definir o alvo via repo variable ZAP_TARGET ou arquivo
    if: ${{ vars.ZAP_TARGET != '' || hashFiles('test_security/zap/zap-baseline.target') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve ZAP target
        id: zaptarget
        shell: bash
        run: |
          TARGET="${{ vars.ZAP_TARGET }}"
          if [[ -z "$TARGET" && -f test_security/zap/zap-baseline.target ]]; then
            TARGET=$(tr -d '\r\n' < test_security/zap/zap-baseline.target)
          fi
          echo "ZAP_TARGET=$TARGET" >> $GITHUB_ENV
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ env.ZAP_TARGET }}
          cmd_options: '-a -m 5'
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore

  locust_smoke:
    if: ${{ hashFiles('test_performance/locust/locustfile.py') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Locust
        shell: bash
        run: |
          pip install --upgrade pip
          if [[ -f test_performance/locust/requirements.txt ]]; then
            pip install -r test_performance/locust/requirements.txt
          else
            pip install locust
          fi
      - name: Run Locust (smoke)
        env:
          PERF_HOST: ${{ vars.PERF_HOST || 'http://localhost:3000' }}
        shell: bash
        run: |
          mkdir -p artifacts
          # Se o locustfile usar outros endpoints, ajuste aqui
          locust -f test_performance/locust/locustfile.py \
            --headless -u 20 -r 5 -t 2m --host "${PERF_HOST}" \
            --csv=artifacts/locust --exit-code-on-error 1 || true
      - name: Upload Locust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: locust-artifacts
          path: artifacts
          if-no-files-found: ignore